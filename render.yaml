services:
  - type: web
    name: tennis-academy-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: tennis-academy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: tennis-academy-db
    databaseName: tennis_academy
    user: tennis_user
