services:
  - type: web
    name: tennis-academy-backend
    env: python
    rootDir: backend
    buildCommand: |
      echo "==> Installing Python dependencies..."
      pip install -r requirements.txt
      echo "==> Build complete"
    startCommand: |
      echo "==> Starting Tennis Academy Backend..."
      python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --log-level info
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: tennis-academy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

databases:
  - name: tennis-academy-db
    databaseName: tennis_academy
    user: tennis_user
